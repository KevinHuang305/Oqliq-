<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 身材尺寸智能測量工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        button, input[type="file"] {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover:not(:disabled) {
            background-color: #e9e9e9;
        }
        button.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        button:disabled, input:disabled {
            background-color: #ddd;
            color: #888;
            cursor: not-allowed;
        }
        .canvas-container {
            position: relative;
            overflow: auto;
            border: 2px dashed #bbb;
            text-align: center;
            background-color: #eee;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            cursor: crosshair;
            max-width: 100%;
            display: block;
        }
        .info {
            margin-bottom: 15px;
            font-size: 14px;
            color: #d9534f;
            font-weight: bold;
            line-height: 1.5;
        }
        .status-success {
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI 身材尺寸智能測量工具</h2>
    
    <div class="info" id="statusText">⏳ 正在載入 MediaPipe AI 模型，請稍候...</div>

    <div class="controls">
        <input type="file" id="imageUpload" accept="image/*" disabled>
        <button id="btnRef" disabled>1. 手動繪製基準線</button>
        <button id="btnMeasure" disabled>2. 新增自訂測量線</button>
        <button id="btnClear" disabled>清除所有測量線</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>
</div>

<!-- 使用 ES Module 載入 MediaPipe Vision -->
<script type="module">
    import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

    const imageUpload = document.getElementById('imageUpload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btnRef = document.getElementById('btnRef');
    const btnMeasure = document.getElementById('btnMeasure');
    const btnClear = document.getElementById('btnClear');
    const statusText = document.getElementById('statusText');

    let img = new Image();
    let mode = 'ref'; 
    let isDrawing = false;
    let startP = null;
    let currentP = null;
    
    let refLine = null; 
    let measureLines =[]; 
    let pxPerUnit = 0; 
    let poseLandmarker = null;

    // 拖曳微調相關變數
    const DRAG_RADIUS = 15; // 觸發拖曳的感應範圍
    let hoveredPoint = null; // 滑鼠懸停的節點 { line, end: 1或2 }
    let draggingPoint = null; // 正在拖曳的節點

    // 1. 初始化 MediaPipe AI 模型
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                    delegate: "GPU"
                },
                runningMode: "IMAGE",
                numPoses: 1
            });
            statusText.innerHTML = "✅ AI 模型載入完成！請上傳一張包含全身（或半身）的照片。<br>💡 提示：AI 會自動畫出身高、肩/胸/腰/臀寬。你隨時可以「拖曳線段兩端的圓點」來微調位置！";
            statusText.className = "info status-success";
            imageUpload.disabled = false;
        } catch (error) {
            statusText.innerHTML = "❌ AI 載入失敗，請檢查網路連線。";
            console.error(error);
        }
    }
    initAI();

    // 2. 處理圖片上傳
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    img.onload = async function() {
        const maxWidth = 800;
        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
            height = (maxWidth / width) * height;
            width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;
        
        refLine = null;
        measureLines =[];
        pxPerUnit = 0;
        redraw();

        btnRef.disabled = false;
        btnClear.disabled = false;

        if (poseLandmarker) {
            statusText.innerHTML = "🔍 AI 正在識別人物骨架與特徵點...";
            statusText.className = "info";
            setTimeout(() => detectAndDrawPose(), 50);
        }
    };

    // 3. AI 自動識別身材特徵
    function detectAndDrawPose() {
        const result = poseLandmarker.detect(img);
        
        if (result.landmarks && result.landmarks.length > 0) {
            const pose = result.landmarks[0];
            
            // 轉換比例的輔助函式
            const toX = (val) => val * canvas.width;
            const toY = (val) => val * canvas.height;

            // --- 抓出身高 (頭頂至腳底) ---
            const nose = pose[0];
            const shoulderY = (pose[11].y + pose[12].y) / 2;
            let headTopY = nose.y - (shoulderY - nose.y) * 0.45;
            if (headTopY < 0) headTopY = 0.02; 
            const footBottomY = Math.max(pose[29].y, pose[30].y, pose[31].y, pose[32].y, pose[27].y, pose[28].y);
            const headX = nose.x;
            const footX = (pose[27].x + pose[28].x) / 2;
            
            refLine = { 
                x1: toX(headX), y1: toY(headTopY), 
                x2: toX(footX), y2: toY(footBottomY), 
                realLength: 0 
            };

            // --- 抓出肩寬 (點11至點12) ---
            const sL = { x: toX(pose[11].x), y: toY(pose[11].y) };
            const sR = { x: toX(pose[12].x), y: toY(pose[12].y) };
            measureLines.push({ name: '肩寬', x1: sL.x, y1: sL.y, x2: sR.x, y2: sR.y });

            // --- 抓出臀寬 (點23至點24) ---
            const hL = { x: toX(pose[23].x), y: toY(pose[23].y) };
            const hR = { x: toX(pose[24].x), y: toY(pose[24].y) };
            measureLines.push({ name: '臀寬', x1: hL.x, y1: hL.y, x2: hR.x, y2: hR.y });

            // --- 推算胸寬 (肩膀往下約 25% 處) ---
            const chestL = { x: sL.x + (hL.x - sL.x) * 0.25, y: sL.y + (hL.y - sL.y) * 0.25 };
            const chestR = { x: sR.x + (hR.x - sR.x) * 0.25, y: sR.y + (hR.y - sR.y) * 0.25 };
            measureLines.push({ name: '胸寬', x1: chestL.x, y1: chestL.y, x2: chestR.x, y2: chestR.y });

            // --- 推算腰寬 (肩膀往下約 60% 處) ---
            const waistL = { x: sL.x + (hL.x - sL.x) * 0.60, y: sL.y + (hL.y - sL.y) * 0.60 };
            const waistR = { x: sR.x + (hR.x - sR.x) * 0.60, y: sR.y + (hR.y - sR.y) * 0.60 };
            measureLines.push({ name: '腰寬', x1: waistL.x, y1: waistL.y, x2: waistR.x, y2: waistR.y });

            redraw();

            // 彈出對話框要求輸入身高
            setTimeout(() => {
                const inputLength = prompt("✨ AI 已自動標記身高、肩/胸/腰/臀！\n請輸入此人的真實身高 (例如: 175)：");
                
                if (inputLength && !isNaN(inputLength) && inputLength > 0) {
                    refLine.realLength = parseFloat(inputLength);
                    pxPerUnit = getDistance({x:refLine.x1, y:refLine.y1}, {x:refLine.x2, y:refLine.y2}) / refLine.realLength;
                    setMode('measure');
                    btnMeasure.disabled = false;
                    statusText.innerHTML = "✅ 設定完成！若 AI 抓的點不準，<b>請直接拖曳線段兩端的圓點進行微調</b>。也可以拉出新線段。";
                    statusText.className = "info status-success";
                    redraw();
                } else {
                    statusText.innerHTML = "⚠️ 未設定身高，無法換算其他尺寸。請重整頁面或點擊「手動繪製基準線」。";
                    statusText.className = "info";
                    setMode('ref');
                }
            }, 200);

        } else {
            statusText.innerHTML = "⚠️ AI 找不到清晰的人物，請改用「手動繪製基準線」。";
            statusText.className = "info";
            setMode('ref');
        }
    }

    // --- 控制邏輯 ---
    btnRef.addEventListener('click', () => setMode('ref'));
    btnMeasure.addEventListener('click', () => setMode('measure'));
    btnClear.addEventListener('click', () => {
        measureLines =[];
        redraw();
    });

    function setMode(newMode) {
        mode = newMode;
        btnRef.classList.toggle('active', mode === 'ref');
        btnMeasure.classList.toggle('active', mode === 'measure');
    }

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        }
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function getDistance(p1, p2) {
        return Math.hypot(p2.x - p1.x, p2.y - p1.y);
    }

    // --- 尋找滑鼠/手指是否觸碰到節點 ---
    function getPointAt(p) {
        if (refLine) {
            if (getDistance(p, {x: refLine.x1, y: refLine.y1}) < DRAG_RADIUS) return { line: refLine, end: 1 };
            if (getDistance(p, {x: refLine.x2, y: refLine.y2}) < DRAG_RADIUS) return { line: refLine, end: 2 };
        }
        for (let i = 0; i < measureLines.length; i++) {
            let line = measureLines[i];
            if (getDistance(p, {x: line.x1, y: line.y1}) < DRAG_RADIUS) return { line: line, end: 1 };
            if (getDistance(p, {x: line.x2, y: line.y2}) < DRAG_RADIUS) return { line: line, end: 2 };
        }
        return null;
    }

    // --- 事件監聽 ---
    canvas.addEventListener('mousedown', handlePointerDown);
    canvas.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e); }, {passive: false});
    window.addEventListener('touchend', handlePointerUp);

    function handlePointerDown(e) {
        if (!img.src || img.src === "") return;
        const p = getCoords(e);
        
        // 優先判斷是否在拖曳現有節點
        const targetPoint = getPointAt(p);
        if (targetPoint) {
            draggingPoint = targetPoint;
            return;
        }

        // 如果不是拖曳，且處於測量模式但未設定基準線
        if (mode === 'measure' && (!refLine || pxPerUnit === 0)) {
            alert("請先完成基準線身高設定！");
            setMode('ref');
            return;
        }

        // 建立新線段
        isDrawing = true;
        startP = p;
        currentP = startP;
    }

    function handlePointerMove(e) {
        const p = getCoords(e);

        // 如果正在拖曳現有節點
        if (draggingPoint) {
            canvas.style.cursor = 'grabbing';
            if (draggingPoint.end === 1) {
                draggingPoint.line.x1 = p.x; draggingPoint.line.y1 = p.y;
            } else {
                draggingPoint.line.x2 = p.x; draggingPoint.line.y2 = p.y;
            }
            
            // 如果拖曳的是身高(基準線)，需要即時重新計算全域比例！
            if (draggingPoint.line === refLine && refLine.realLength > 0) {
                const dist = getDistance({x: refLine.x1, y: refLine.y1}, {x: refLine.x2, y: refLine.y2});
                pxPerUnit = dist / refLine.realLength;
            }
            redraw();
            return;
        }

        // 如果沒有在拖曳也沒有在畫線，僅處理 Hover 游標效果
        if (!isDrawing) {
            hoveredPoint = getPointAt(p);
            canvas.style.cursor = hoveredPoint ? 'grab' : 'crosshair';
            redraw(); // 更新畫面上節點的 Highlight
            return;
        }

        // 正在畫新線段
        currentP = p;
        redraw();
        
        // 即時預覽新線段
        if (mode === 'measure' && pxPerUnit > 0) {
            const dist = getDistance(startP, currentP);
            const realVal = (dist / pxPerUnit).toFixed(1);
            drawLine(startP, currentP, '#007bff'); 
            drawText(startP, currentP, `新增: ${realVal}`, '#007bff');
        } else if (mode === 'ref') {
            drawLine(startP, currentP, '#dc3545'); 
        }
    }

    function handlePointerUp(e) {
        if (draggingPoint) {
            draggingPoint = null; // 結束拖曳
            canvas.style.cursor = 'crosshair';
            return;
        }

        if (!isDrawing) return;
        isDrawing = false;

        const dist = getDistance(startP, currentP);
        if (dist > 5) { // 避免單純點擊產生無效線段
            if (mode === 'ref') {
                const inputLength = prompt("請輸入這條基準線的實際數值（例如身高 175）：");
                if (inputLength && !isNaN(inputLength) && inputLength > 0) {
                    refLine = { x1: startP.x, y1: startP.y, x2: currentP.x, y2: currentP.y, realLength: parseFloat(inputLength) };
                    pxPerUnit = dist / refLine.realLength;
                    btnMeasure.disabled = false;
                    setMode('measure'); 
                    statusText.innerHTML = "✅ 基準線重設完成！";
                    statusText.className = "info status-success";
                }
            } else if (mode === 'measure') {
                measureLines.push({ name: '', x1: startP.x, y1: startP.y, x2: currentP.x, y2: currentP.y });
            }
        }
        redraw();
    }

    // --- 繪製畫面 ---
    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.src) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // 繪製身高基準線
        if (refLine && (refLine.realLength > 0 || isDrawing)) {
            const p1 = {x: refLine.x1, y: refLine.y1};
            const p2 = {x: refLine.x2, y: refLine.y2};
            drawLine(p1, p2, '#dc3545');
            const txt = refLine.realLength > 0 ? `身高: ${refLine.realLength}` : `身高 (請設定)`;
            drawText(p1, p2, txt, '#dc3545');
        }

        // 繪製其他測量線
        measureLines.forEach(line => {
            const p1 = {x: line.x1, y: line.y1};
            const p2 = {x: line.x2, y: line.y2};
            let text = line.name ? line.name + " " : "";
            if (pxPerUnit > 0) {
                const dist = getDistance(p1, p2);
                text += (dist / pxPerUnit).toFixed(1);
            }
            // 自動產生的特徵線用藍紫色，自己畫的用正藍色
            const color = line.name ? '#6f42c1' : '#007bff';
            drawLine(p1, p2, color);
            if (text) drawText(p1, p2, text, color);
        });

        // 如果滑鼠懸停在節點上，畫出螢光黃色提示圈
        if (hoveredPoint) {
            const target = hoveredPoint.end === 1 
                ? { x: hoveredPoint.line.x1, y: hoveredPoint.line.y1 } 
                : { x: hoveredPoint.line.x2, y: hoveredPoint.line.y2 };
            ctx.beginPath();
            ctx.arc(target.x, target.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 235, 59, 0.6)";
            ctx.fill();
            ctx.strokeStyle = "#fbc02d";
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    function drawLine(p1, p2, color) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // 畫實心端點
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(p1.x, p1.y, 5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(p2.x, p2.y, 5, 0, Math.PI * 2); ctx.fill();
    }

    function drawText(p1, p2, text, color) {
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;
        ctx.font = "bold 15px Arial";
        
        const textWidth = ctx.measureText(text).width;
        // 文字白底框，增加可讀性
        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        ctx.fillRect(midX - textWidth/2 - 6, midY - 20, textWidth + 12, 24);
        
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.fillText(text, midX, midY - 2);
    }
</script>

</body>
</html>
