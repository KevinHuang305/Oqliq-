<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 照片尺寸自動測量工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        button, input[type="file"] {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover:not(:disabled) {
            background-color: #e9e9e9;
        }
        button.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        button:disabled, input:disabled {
            background-color: #ddd;
            color: #888;
            cursor: not-allowed;
        }
        .canvas-container {
            position: relative;
            overflow: auto;
            border: 2px dashed #bbb;
            text-align: center;
            background-color: #eee;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            cursor: crosshair;
            max-width: 100%;
            display: block;
        }
        .info {
            margin-bottom: 15px;
            font-size: 14px;
            color: #d9534f;
            font-weight: bold;
        }
        .status-success {
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI 照片尺寸自動測量工具</h2>
    
    <div class="info" id="statusText">⏳ 正在載入 MediaPipe AI 模型，請稍候...</div>

    <div class="controls">
        <input type="file" id="imageUpload" accept="image/*" disabled>
        <button id="btnRef" disabled>1. 手動重繪基準線</button>
        <button id="btnMeasure" disabled>2. 測量其他尺寸</button>
        <button id="btnClear" disabled>清除所有測量線</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>
</div>

<!-- 使用 ES Module 載入 MediaPipe Vision -->
<script type="module">
    import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

    const imageUpload = document.getElementById('imageUpload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btnRef = document.getElementById('btnRef');
    const btnMeasure = document.getElementById('btnMeasure');
    const btnClear = document.getElementById('btnClear');
    const statusText = document.getElementById('statusText');

    let img = new Image();
    let mode = 'ref'; // 'ref' 或 'measure'
    let isDrawing = false;
    let startP = null;
    let currentP = null;
    
    let refLine = null; 
    let measureLines =[]; 
    let pxPerUnit = 0; 

    let poseLandmarker = null;

    // 1. 初始化 MediaPipe AI 模型
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                    delegate: "GPU"
                },
                runningMode: "IMAGE",
                numPoses: 1
            });
            statusText.innerHTML = "✅ AI 模型載入完成！請上傳一張包含全身（或半身）的照片。";
            statusText.className = "info status-success";
            imageUpload.disabled = false;
        } catch (error) {
            statusText.innerHTML = "❌ AI 載入失敗，請檢查網路連線。";
            console.error(error);
        }
    }
    initAI();

    // 2. 處理圖片上傳
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    img.onload = async function() {
        // 設定 Canvas 大小
        const maxWidth = 800;
        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
            height = (maxWidth / width) * height;
            width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;
        
        refLine = null;
        measureLines =[];
        pxPerUnit = 0;
        redraw();

        btnRef.disabled = false;
        btnClear.disabled = false;

        // 啟動 AI 識別
        if (poseLandmarker) {
            statusText.innerHTML = "🔍 AI 正在識別人物骨架...";
            statusText.className = "info";

            // 讓瀏覽器有時間渲染畫面再執行 AI
            setTimeout(() => {
                detectAndDrawPose();
            }, 50);
        }
    };

    // 3. AI 自動識別頭頂與腳底
    function detectAndDrawPose() {
        const result = poseLandmarker.detect(img);
        
        if (result.landmarks && result.landmarks.length > 0) {
            const pose = result.landmarks[0];
            
            // MediaPipe 標記對應 (0: 鼻子, 11/12: 左右肩膀, 27/28: 腳踝, 29-32: 腳跟與腳尖)
            const nose = pose[0];
            const shoulderY = (pose[11].y + pose[12].y) / 2;
            
            // 估算頭頂 (利用鼻子到肩膀的距離向上推算約 0.45 倍)
            let headTopY = nose.y - (shoulderY - nose.y) * 0.45;
            if (headTopY < 0) headTopY = 0.02; // 防止超界

            // 尋找雙腳最低點 (若沒有全身照，會自動抓畫面中身體的最低點)
            const footBottomY = Math.max(pose[29].y, pose[30].y, pose[31].y, pose[32].y, pose[27].y, pose[28].y);
            
            // 頭頂 X 座標抓鼻子，腳底 X 座標抓雙腳踝平均
            const headX = nose.x;
            const footX = (pose[27].x + pose[28].x) / 2;

            // 轉換為 Canvas 座標
            const p1 = { x: headX * canvas.width, y: headTopY * canvas.height };
            const p2 = { x: footX * canvas.width, y: footBottomY * canvas.height };

            // 自動畫出紅線
            refLine = { x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, realLength: 0 };
            redraw();

            // 延遲跳出提示框，讓線條先顯示出來
            setTimeout(() => {
                const inputLength = prompt("✨ AI 已自動拉出「頭頂到腳底」的基準線！\n請輸入他的真實身高數值 (例如: 175)：");
                
                if (inputLength && !isNaN(inputLength) && inputLength > 0) {
                    refLine.realLength = parseFloat(inputLength);
                    pxPerUnit = getDistance(p1, p2) / refLine.realLength;
                    setMode('measure');
                    btnMeasure.disabled = false;
                    statusText.innerHTML = "✅ 設定完成！您現在可以在畫面上自由拉線，測量其他部位的尺寸。";
                    statusText.className = "info status-success";
                    redraw();
                } else {
                    refLine = null;
                    redraw();
                    statusText.innerHTML = "⚠️ 未輸入有效身高。請點擊「手動重繪基準線」自己拉線。";
                    statusText.className = "info";
                    setMode('ref');
                }
            }, 200);

        } else {
            statusText.innerHTML = "⚠️ AI 找不到清晰的人物，請改用「手動重繪基準線」從頭拉到腳。";
            statusText.className = "info";
            setMode('ref');
        }
    }

    // --- 以下為手動繪圖與 UI 控制邏輯 ---

    btnRef.addEventListener('click', () => setMode('ref'));
    btnMeasure.addEventListener('click', () => setMode('measure'));
    btnClear.addEventListener('click', () => {
        measureLines =[];
        redraw();
    });

    function setMode(newMode) {
        mode = newMode;
        btnRef.classList.toggle('active', mode === 'ref');
        btnMeasure.classList.toggle('active', mode === 'measure');
    }

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX;
        let clientY = e.clientY;

        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }

        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function getDistance(p1, p2) {
        return Math.hypot(p2.x - p1.x, p2.y - p1.y);
    }

    // 滑鼠與觸控事件
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
    window.addEventListener('touchend', stopDrawing);

    function startDrawing(e) {
        if (!img.src || img.src === "") return;
        if (mode === 'measure' && !refLine) {
            alert("請先設定基準線數值！");
            setMode('ref');
            return;
        }
        isDrawing = true;
        startP = getCoords(e);
        currentP = startP;
    }

    function draw(e) {
        if (!isDrawing) return;
        currentP = getCoords(e);
        redraw();

        if (mode === 'measure' && pxPerUnit > 0) {
            const dist = getDistance(startP, currentP);
            const realVal = (dist / pxPerUnit).toFixed(1);
            drawLine(startP, currentP, '#007bff'); 
            drawText(startP, currentP, `${realVal}`, '#007bff');
        } else if (mode === 'ref') {
            drawLine(startP, currentP, '#dc3545'); 
        }
    }

    function stopDrawing(e) {
        if (!isDrawing) return;
        isDrawing = false;

        const dist = getDistance(startP, currentP);
        
        if (dist > 5) {
            if (mode === 'ref') {
                const inputLength = prompt("請輸入這條基準線的實際數值（例如 175）：");
                if (inputLength && !isNaN(inputLength) && inputLength > 0) {
                    refLine = { x1: startP.x, y1: startP.y, x2: currentP.x, y2: currentP.y, realLength: parseFloat(inputLength) };
                    pxPerUnit = dist / refLine.realLength;
                    btnMeasure.disabled = false;
                    setMode('measure'); 
                    statusText.innerHTML = "✅ 手動基準線設定完成！可以開始測量了。";
                    statusText.className = "info status-success";
                }
            } else if (mode === 'measure') {
                measureLines.push({ x1: startP.x, y1: startP.y, x2: currentP.x, y2: currentP.y });
            }
        }
        redraw();
    }

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.src) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        if (refLine && refLine.realLength > 0) {
            const p1 = {x: refLine.x1, y: refLine.y1};
            const p2 = {x: refLine.x2, y: refLine.y2};
            drawLine(p1, p2, '#dc3545');
            drawText(p1, p2, `${refLine.realLength} (基準)`, '#dc3545');
        }

        measureLines.forEach(line => {
            const p1 = {x: line.x1, y: line.y1};
            const p2 = {x: line.x2, y: line.y2};
            const dist = getDistance(p1, p2);
            const realVal = (dist / pxPerUnit).toFixed(1);
            
            drawLine(p1, p2, '#007bff');
            drawText(p1, p2, `${realVal}`, '#007bff');
        });
    }

    function drawLine(p1, p2, color) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(p1.x, p1.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p2.x, p2.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawText(p1, p2, text, color) {
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;
        ctx.font = "bold 16px Arial";
        ctx.fillStyle = "white";
        const textWidth = ctx.measureText(text).width;
        ctx.fillRect(midX - textWidth/2 - 5, midY - 20, textWidth + 10, 24);
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.fillText(text, midX, midY - 2);
    }
</script>

</body>
</html>
