<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 身材智能測量與直接建檔系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .info-panel {
            background-color: #eef2f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .info-panel input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 120px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        button, input[type="file"] {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover:not(:disabled) {
            background-color: #e9e9e9;
        }
        button.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        button:disabled, input:disabled {
            background-color: #ddd;
            color: #888;
            cursor: not-allowed;
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
            border-color: #28a745;
            font-weight: bold;
        }
        .btn-submit:hover:not(:disabled) {
            background-color: #218838;
        }
        .canvas-container {
            position: relative;
            overflow: auto;
            border: 2px dashed #bbb;
            text-align: center;
            background-color: #eee;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            cursor: crosshair;
            max-width: 100%;
            display: block;
        }
        .status-text {
            margin-bottom: 15px;
            font-size: 14px;
            color: #d9534f;
            font-weight: bold;
            line-height: 1.5;
        }
        .status-success { color: #28a745; }
        .file-name-display { font-size: 13px; color: #666; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI 身材智能測量與直接建檔系統</h2>
    
    <!-- 個人資訊輸入區 -->
    <div class="info-panel">
        <strong>🧑 基本資料：</strong>
        <input type="text" id="personName" placeholder="輸入姓名">
        <input type="number" id="personAge" placeholder="輸入年齡">
        <input type="text" id="personJob" placeholder="輸入職業/工作">
        <span class="file-name-display" id="fileNameDisplay">尚未上傳照片</span>
    </div>

    <div class="status-text" id="statusText">⏳ 正在載入 MediaPipe AI 模型，請稍候...</div>

    <!-- 控制區 -->
    <div class="controls">
        <input type="file" id="imageUpload" accept="image/*" disabled>
        <button id="btnRef" disabled>1. 手動微調基準線</button>
        <button id="btnMeasure" disabled>2. 新增自訂測量線</button>
        <button id="btnClear" disabled>清除所有線條</button>
        <button id="btnSubmitToSheet" class="btn-submit" disabled>📊 直接儲存至 Google 試算表</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>
</div>

<!-- 使用 ES Module 載入 MediaPipe Vision -->
<script type="module">
    // ==========================================
    // 🌟 請將你在步驟一取得的「網頁應用程式網址」貼在下方引號內
    // ==========================================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwA9WuDABN0c1Ad_hiqbufnS2s9kd4O1kOb_r8urqiXEfP90VggswcAPrx4-xze137l/exec";
    // ==========================================

    import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

    const imageUpload = document.getElementById('imageUpload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btnRef = document.getElementById('btnRef');
    const btnMeasure = document.getElementById('btnMeasure');
    const btnClear = document.getElementById('btnClear');
    const btnSubmitToSheet = document.getElementById('btnSubmitToSheet');
    const statusText = document.getElementById('statusText');
    const fileNameDisplay = document.getElementById('fileNameDisplay');

    let img = new Image();
    let mode = 'ref'; 
    let isDrawing = false;
    let startP = null;
    let currentP = null;
    
    let refLine = null; 
    let measureLines =[]; 
    let pxPerUnit = 0; 
    let poseLandmarker = null;
    let uploadedFileName = "未命名";

    const DRAG_RADIUS = 15; 
    let hoveredPoint = null; 
    let draggingPoint = null; 

    // 1. 初始化 AI 模型
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                    delegate: "GPU"
                },
                runningMode: "IMAGE",
                numPoses: 1
            });
            statusText.innerHTML = "✅ AI 模型載入完成！請上傳照片。";
            statusText.className = "status-text status-success";
            imageUpload.disabled = false;
        } catch (error) {
            statusText.innerHTML = "❌ AI 載入失敗，請檢查網路。";
            console.error(error);
        }
    }
    initAI();

    // 2. 處理圖片上傳
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        uploadedFileName = file.name;
        fileNameDisplay.innerText = `📂 檔名: ${uploadedFileName}`;

        const reader = new FileReader();
        reader.onload = function(event) { img.src = event.target.result; }
        reader.readAsDataURL(file);
    });

    img.onload = async function() {
        const maxWidth = 800;
        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
            height = (maxWidth / width) * height;
            width = maxWidth;
        }
        canvas.width = width; canvas.height = height;
        
        refLine = null; measureLines =[]; pxPerUnit = 0;
        redraw();

        btnRef.disabled = false; btnClear.disabled = false; btnSubmitToSheet.disabled = false;

        if (poseLandmarker) {
            statusText.innerHTML = "🔍 正在自動識別身材特徵點...";
            statusText.className = "status-text";
            setTimeout(() => detectAndDrawPose(), 50);
        }
    };

    // 3. AI 識別與繪製
    function detectAndDrawPose() {
        const result = poseLandmarker.detect(img);
        if (result.landmarks && result.landmarks.length > 0) {
            const pose = result.landmarks[0];
            const toX = (val) => val * canvas.width;
            const toY = (val) => val * canvas.height;

            const nose = pose[0];
            const shoulderY = (pose[11].y + pose[12].y) / 2;
            let headTopY = nose.y - (shoulderY - nose.y) * 0.45;
            if (headTopY < 0) headTopY = 0.02; 
            const footBottomY = Math.max(pose[29].y, pose[30].y, pose[31].y, pose[32].y, pose[27].y, pose[28].y);
            const headX = nose.x; const footX = (pose[27].x + pose[28].x) / 2;
            
            refLine = { x1: toX(headX), y1: toY(headTopY), x2: toX(footX), y2: toY(footBottomY), realLength: 0 };

            const sL = { x: toX(pose[11].x), y: toY(pose[11].y) };
            const sR = { x: toX(pose[12].x), y: toY(pose[12].y) };
            measureLines.push({ name: '肩寬', x1: sL.x, y1: sL.y, x2: sR.x, y2: sR.y });

            const hL = { x: toX(pose[23].x), y: toY(pose[23].y) };
            const hR = { x: toX(pose[24].x), y: toY(pose[24].y) };
            measureLines.push({ name: '臀寬', x1: hL.x, y1: hL.y, x2: hR.x, y2: hR.y });

            const chestL = { x: sL.x + (hL.x - sL.x)*0.25, y: sL.y + (hL.y - sL.y)*0.25 };
            const chestR = { x: sR.x + (hR.x - sR.x)*0.25, y: sR.y + (hR.y - sR.y)*0.25 };
            measureLines.push({ name: '胸寬', x1: chestL.x, y1: chestL.y, x2: chestR.x, y2: chestR.y });

            const waistL = { x: sL.x + (hL.x - sL.x)*0.60, y: sL.y + (hL.y - sL.y)*0.60 };
            const waistR = { x: sR.x + (hR.x - sR.x)*0.60, y: sR.y + (hR.y - sR.y)*0.60 };
            measureLines.push({ name: '腰寬', x1: waistL.x, y1: waistL.y, x2: waistR.x, y2: waistR.y });

            redraw();

            setTimeout(() => {
                const inputLength = prompt("✨ AI 已自動標記！\n請輸入此人真實身高 (例: 175)：");
                if (inputLength && !isNaN(inputLength) && inputLength > 0) {
                    refLine.realLength = parseFloat(inputLength);
                    pxPerUnit = getDistance({x:refLine.x1, y:refLine.y1}, {x:refLine.x2, y:refLine.y2}) / refLine.realLength;
                    setMode('measure'); btnMeasure.disabled = false;
                    statusText.innerHTML = "✅ 測量準備就緒！可隨時拖曳節點微調，完成後點擊綠色按鈕儲存至 Google 試算表。";
                    statusText.className = "status-text status-success";
                    redraw();
                } else {
                    statusText.innerHTML = "⚠️ 未設定身高，請點擊「手動微調基準線」。";
                    setMode('ref');
                }
            }, 200);
        }
    }

    // --- Google 試算表 (Apps Script) 提交邏輯 ---
    btnSubmitToSheet.addEventListener('click', () => {
        if (!refLine || pxPerUnit === 0) {
            alert("⚠️ 錯誤：尚未設定身高尺寸，無法產出數據。"); return;
        }
        if (APPS_SCRIPT_URL.includes("你的專屬ID放在這")) {
            alert("⚠️ 尚未設定 APPS_SCRIPT_URL！請先依教學建立 Google Apps Script 並將網址填入 HTML 中。"); return;
        }
        
        const pName = document.getElementById('personName').value || "未提供";
        const pAge = document.getElementById('personAge').value || "未提供";
        const pJob = document.getElementById('personJob').value || "未提供";
        
        // 整理所有測量數據
        let results =[`身高: ${refLine.realLength}`];
        measureLines.forEach(line => {
            const dist = getDistance({x: line.x1, y: line.y1}, {x: line.x2, y: line.y2});
            const realVal = (dist / pxPerUnit).toFixed(1);
            const label = line.name || "自訂線段";
            results.push(`${label}: ${realVal}`);
        });
        const finalResultString = results.join(" , ");

        // 封裝表單資料
        const formData = new URLSearchParams();
        formData.append("name", pName);
        formData.append("age", pAge);
        formData.append("job", pJob);
        formData.append("filename", uploadedFileName);
        formData.append("measurements", finalResultString);

        btnSubmitToSheet.innerText = "⏳ 傳送中...";
        btnSubmitToSheet.disabled = true;

        // 使用 fetch 將資料 POST 到 Google Apps Script
        fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: formData
        }).then(response => {
            alert(`✅ 資料已成功儲存到 Google 試算表！\n\n人員：${pName}\n數據：${finalResultString}`);
            btnSubmitToSheet.innerText = "📊 直接儲存至 Google 試算表";
            btnSubmitToSheet.disabled = false;
        }).catch(err => {
            // Google Apps Script 有時會因 CORS 報錯，但資料其實已寫入。如果發生，也能處理。
            alert(`✅ 已嘗試發送請求至試算表 (如未看見資料請檢查 GAS 權限設定)。\n\n送出數據：${finalResultString}`);
            btnSubmitToSheet.innerText = "📊 直接儲存至 Google 試算表";
            btnSubmitToSheet.disabled = false;
        });
    });

    // --- 滑鼠繪圖與拖曳微調邏輯 ---
    btnRef.addEventListener('click', () => setMode('ref'));
    btnMeasure.addEventListener('click', () => setMode('measure'));
    btnClear.addEventListener('click', () => { measureLines =[]; redraw(); });

    function setMode(newMode) {
        mode = newMode;
        btnRef.classList.toggle('active', mode === 'ref');
        btnMeasure.classList.toggle('active', mode === 'measure');
    }

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        let cX = e.clientX, cY = e.clientY;
        if (e.touches && e.touches.length > 0) { cX = e.touches[0].clientX; cY = e.touches[0].clientY; }
        return { x: (cX - rect.left) * (canvas.width / rect.width), y: (cY - rect.top) * (canvas.height / rect.height) };
    }
    function getDistance(p1, p2) { return Math.hypot(p2.x - p1.x, p2.y - p1.y); }

    function getPointAt(p) {
        if (refLine) {
            if (getDistance(p, {x: refLine.x1, y: refLine.y1}) < DRAG_RADIUS) return { line: refLine, end: 1 };
            if (getDistance(p, {x: refLine.x2, y: refLine.y2}) < DRAG_RADIUS) return { line: refLine, end: 2 };
        }
        for (let i = 0; i < measureLines.length; i++) {
            let line = measureLines[i];
            if (getDistance(p, {x: line.x1, y: line.y1}) < DRAG_RADIUS) return { line: line, end: 1 };
            if (getDistance(p, {x: line.x2, y: line.y2}) < DRAG_RADIUS) return { line: line, end: 2 };
        }
        return null;
    }

    canvas.addEventListener('mousedown', down); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    canvas.addEventListener('touchstart', (e)=>{e.preventDefault(); down(e);},{passive:false});
    canvas.addEventListener('touchmove', (e)=>{e.preventDefault(); move(e);},{passive:false});
    window.addEventListener('touchend', up);

    function down(e) {
        if (!img.src) return;
        const p = getCoords(e);
        const target = getPointAt(p);
        if (target) { draggingPoint = target; return; }
        if (mode === 'measure' && pxPerUnit === 0) { alert("請先完成身高設定！"); setMode('ref'); return; }
        isDrawing = true; startP = p; currentP = startP;
    }

    function move(e) {
        const p = getCoords(e);
        if (draggingPoint) {
            canvas.style.cursor = 'grabbing';
            if (draggingPoint.end === 1) { draggingPoint.line.x1 = p.x; draggingPoint.line.y1 = p.y; }
            else { draggingPoint.line.x2 = p.x; draggingPoint.line.y2 = p.y; }
            if (draggingPoint.line === refLine && refLine.realLength > 0) {
                pxPerUnit = getDistance({x:refLine.x1, y:refLine.y1}, {x:refLine.x2, y:refLine.y2}) / refLine.realLength;
            }
            redraw(); return;
        }
        if (!isDrawing) {
            hoveredPoint = getPointAt(p);
            canvas.style.cursor = hoveredPoint ? 'grab' : 'crosshair';
            redraw(); return;
        }
        currentP = p; redraw();
        if (mode === 'measure' && pxPerUnit > 0) {
            drawLine(startP, currentP, '#007bff'); 
            drawText(startP, currentP, `新增: ${(getDistance(startP, currentP)/pxPerUnit).toFixed(1)}`, '#007bff');
        } else if (mode === 'ref') { drawLine(startP, currentP, '#dc3545'); }
    }

    function up(e) {
        if (draggingPoint) { draggingPoint = null; canvas.style.cursor = 'crosshair'; return; }
        if (!isDrawing) return;
        isDrawing = false;
        const dist = getDistance(startP, currentP);
        if (dist > 5) {
            if (mode === 'ref') {
                const len = prompt("請輸入身高/基準線數值 (例如 175)：");
                if (len && !isNaN(len) && len > 0) {
                    refLine = { x1: startP.x, y1: startP.y, x2: currentP.x, y2: currentP.y, realLength: parseFloat(len) };
                    pxPerUnit = dist / refLine.realLength;
                    btnMeasure.disabled = false; setMode('measure'); 
                }
            } else if (mode === 'measure') {
                measureLines.push({ name: '', x1: startP.x, y1: startP.y, x2: currentP.x, y2: currentP.y });
            }
        }
        redraw();
    }

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.src) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        if (refLine && (refLine.realLength > 0 || isDrawing)) {
            const p1 = {x: refLine.x1, y: refLine.y1}, p2 = {x: refLine.x2, y: refLine.y2};
            drawLine(p1, p2, '#dc3545');
            drawText(p1, p2, refLine.realLength > 0 ? `身高: ${refLine.realLength}` : `身高 (請設定)`, '#dc3545');
        }

        measureLines.forEach(line => {
            const p1 = {x: line.x1, y: line.y1}, p2 = {x: line.x2, y: line.y2};
            let text = line.name ? line.name + " " : "";
            if (pxPerUnit > 0) text += (getDistance(p1, p2) / pxPerUnit).toFixed(1);
            const color = line.name ? '#6f42c1' : '#007bff';
            drawLine(p1, p2, color);
            if (text) drawText(p1, p2, text, color);
        });

        if (hoveredPoint) {
            const t = hoveredPoint.end === 1 ? {x:hoveredPoint.line.x1, y:hoveredPoint.line.y1} : {x:hoveredPoint.line.x2, y:hoveredPoint.line.y2};
            ctx.beginPath(); ctx.arc(t.x, t.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,235,59,0.6)"; ctx.fill();
            ctx.strokeStyle = "#fbc02d"; ctx.lineWidth = 2; ctx.stroke();
        }
    }

    function drawLine(p1, p2, color) {
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(p1.x, p1.y, 5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(p2.x, p2.y, 5, 0, Math.PI * 2); ctx.fill();
    }
    function drawText(p1, p2, text, color) {
        const mX = (p1.x + p2.x)/2, mY = (p1.y + p2.y)/2;
        ctx.font = "bold 15px Arial";
        const w = ctx.measureText(text).width;
        ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.fillRect(mX - w/2 - 6, mY - 20, w + 12, 24);
        ctx.fillStyle = color; ctx.textAlign = "center"; ctx.fillText(text, mX, mY - 2);
    }
</script>
</body>
</html>
